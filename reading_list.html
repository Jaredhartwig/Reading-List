<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reading List</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    form { margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: .5rem; text-align: left; }
    th { background:#f3f3f3; }
    .small { font-size: .9rem; color:#555 }
    .controls { display:flex; gap:.5rem; align-items:center }
  </style>
</head>
<body>
  <h1>My Reading List</h1>

  <section>
    <h2>Add a book</h2>
    <form action="/add-book" method="post">
      <div>
        <label>Title: <input type="text" name="title" required></label>
      </div>
      <div>
        <label>Author: <input type="text" name="author"></label>
      </div>
      <div>
        <label>Notes: <input type="text" name="notes"></label>
      </div>
      <div>
        <label>Status:
          <select name="status">
            <option value="n">Not read</option>
            <option value="y">Read</option>
          </select>
        </label>
      </div>
      <div style="margin-top:.5rem">
        <button type="submit">Add Book</button>
      </div>
    </form>
  </section>

  <section>
    <h2>Current list</h2>
    <div class="small">(Titles are checked case-insensitively for duplicates on add.)</div>
    <table id="list-table" aria-live="polite">
      <thead>
        <tr><th>#</th><th>Title</th><th>Author</th><th>Notes</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <script>
    async function load() {
      try {
        const res = await fetch('/api/list');
        const list = await res.json();
        const tbody = document.querySelector('#list-table tbody');
        tbody.innerHTML = '';
        list.forEach((item, idx) => {
          const tr = document.createElement('tr');
          const title = item[0] || '';
          const author = item[1] || '';
          const notes = item[2] || '';
          const status = item[3] || 'n';

          tr.innerHTML = `
            <td>${idx+1}</td>
            <td>${escapeHtml(title)}</td>
            <td>${escapeHtml(author)}</td>
            <td>${escapeHtml(notes)}</td>
            <td>${status === 'y' ? 'Read' : 'Not read'}</td>
            <td>
              <form method="post" action="/update-book" style="display:inline">
                <input type="hidden" name="index" value="${idx}">
                <select name="status">
                  <option value="n" ${status==='n' ? 'selected' : ''}>Not read</option>
                  <option value="y" ${status==='y' ? 'selected' : ''}>Read</option>
                </select>
                <button type="submit">Update</button>
              </form>
              <form method="post" action="/delete-book" style="display:inline; margin-left:.5rem" onsubmit="return confirm('Delete this book?');">
                <input type="hidden" name="index" value="${idx}">
                <button type="submit">Delete</button>
              </form>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) {
        console.error(e);
      }
    }

    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/[&<>"']/g, function (c) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
      });
    }

    window.addEventListener('load', load);
  </script>
</body>
</html>
