<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reading List</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; }
      h1 { margin-bottom: 8px; }
      .card { border: 1px solid #ddd; padding: 12px; margin-bottom: 12px; border-radius: 6px; }
      label { display:block; margin-top:8px; }
      input[type="text"], textarea, select { width:100%; padding:8px; box-sizing:border-box; }
      button { margin-top:10px; padding:8px 12px; }
      table { width:100%; border-collapse: collapse; margin-top:12px; }
      th, td { border:1px solid #ccc; padding:6px; text-align:left; }
    </style>
  </head>
  <body>
    <h1>Reading List</h1>

    <div class="card" id="add-card">
      <h2>Add a book</h2>
      <form id="add-form" action="/add-book" method="post">
        <label>Title
          <input type="text" name="title" required />
        </label>
        <label>Author
          <input type="text" name="author" required />
        </label>
        <label>Notes (optional)
          <textarea name="notes" rows="2"></textarea>
        </label>
        <label>Status
          <select name="status">
            <option value="n">Unread</option>
            <option value="y">Read</option>
          </select>
        </label>
        <button type="submit">Add Book</button>
      </form>
    </div>

    <div class="card" id="view-card">
      <h2>Current list</h2>
      <button id="refresh-list">Refresh list</button>
      <div id="list-container">
        <p>No data loaded yet. Click "Refresh list" to fetch.</p>
      </div>
    </div>

    <div class="card" id="update-card">
      <h2>Update a book's status</h2>
      <form id="update-form" action="/update-book" method="post">
        <label>Book (choose index)
          <select name="index" id="book-select">
            <option value="">-- Refresh list to populate --</option>
          </select>
        </label>
        <label>New status
          <select name="status">
            <option value="n">Unread</option>
            <option value="y">Read</option>
          </select>
        </label>
        <button type="submit">Update</button>
      </form>
    </div>

    <script>
      async function fetchList() {
        try {
          const res = await fetch('/api/list');
          if (!res.ok) throw new Error('Network response not ok');
          const data = await res.json();
          renderList(data);
        } catch (err) {
          document.getElementById('list-container').innerHTML = '<p>Unable to fetch list.</p>';
        }
      }

      function renderList(items) {
        if (!items || items.length === 0) {
          document.getElementById('list-container').innerHTML = '<p>Your reading list is empty.</p>';
          document.getElementById('book-select').innerHTML = '<option value="">-- empty --</option>';
          return;
        }
        const table = document.createElement('table');
        const thead = document.createElement('thead');
        thead.innerHTML = '<tr><th>#</th><th>Title</th><th>Author</th><th>Notes</th><th>Status</th></tr>';
        table.appendChild(thead);
        const tbody = document.createElement('tbody');
        items.forEach((it, idx) => {
          const tr = document.createElement('tr');
          const status = it[3] === 'y' ? 'Read' : 'Unread';
          tr.innerHTML = `<td>${idx+1}</td><td>${escapeHtml(it[0]||'')}</td><td>${escapeHtml(it[1]||'')}</td><td>${escapeHtml(it[2]||'')}</td><td>${status}</td>`;
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        container.appendChild(table);

        const select = document.getElementById('book-select');
        select.innerHTML = '';
        items.forEach((it, idx) => {
          const opt = document.createElement('option');
          opt.value = idx;
          opt.text = `${idx+1}. ${it[0] || 'Untitled'} (${it[1] || 'Unknown'})`;
          select.appendChild(opt);
        });
      }

      function escapeHtml(text) {
        return text.replace(/[&<>\"']/g, function (m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":"&#39;"}[m]; });
      }

      document.getElementById('refresh-list').addEventListener('click', (e) => { e.preventDefault(); fetchList(); });

      // initial load
      fetchList();
    </script>
  </body>
</html>
